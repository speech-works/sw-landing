name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build and export
        env:
          NEXT_PUBLIC_GOOGLE_FORM_ACTION_URL: ${{ vars.NEXT_PUBLIC_GOOGLE_FORM_ACTION_URL }}
          NEXT_PUBLIC_GOOGLE_FORM_EMAIL_ENTRY_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_FORM_EMAIL_ENTRY_ID }}
          NEXT_PUBLIC_GOOGLE_FORM_SOURCE_ENTRY_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_FORM_SOURCE_ENTRY_ID }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
