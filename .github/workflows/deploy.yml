name: Deploy Next.js to GitHub Pages

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: github-pages
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        # NODE_AUTH_TOKEN authenticates to GitHub Packages so the private
        # @speech-works/web-chrome dependency (see .npmrc) can be installed in CI.
        run: npm install
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}

      - name: Build and export
        env:
          NEXT_PUBLIC_GOOGLE_FORM_ACTION_URL: ${{ vars.NEXT_PUBLIC_GOOGLE_FORM_ACTION_URL }}
          NEXT_PUBLIC_GOOGLE_FORM_EMAIL_ENTRY_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_FORM_EMAIL_ENTRY_ID }}
          NEXT_PUBLIC_GOOGLE_FORM_SOURCE_ENTRY_ID: ${{ vars.NEXT_PUBLIC_GOOGLE_FORM_SOURCE_ENTRY_ID }}
        run: npm run build

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          publish_branch: gh-pages
